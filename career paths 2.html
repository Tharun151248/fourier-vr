<!DOCTYPE html>
<html>
  <head>
    <title>Professional Career VR World</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      // Logic to switch environments based on the selected career
      AFRAME.registerComponent('environment-changer', {
        schema: {
          preset: {type: 'string'},
          careerTitle: {type: 'string'},
          description: {type: 'string'}
        },
        init: function () {
          var el = this.el;
          var data = this.data;
          var world = document.querySelector('#world');
          var infoText = document.querySelector('#info-text');

          el.addEventListener('click', function () {
            // Change the entire world environment
            world.setAttribute('environment', 'preset', data.preset);
            // Update the display text
            infoText.setAttribute('value', data.careerTitle + "\n\n" + data.description);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        </a-assets>

      <a-entity id="world" environment="preset: contact; seed: 4; dressingAmount: 20"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 3">
        <a-cursor color="#2ecc71"></a-cursor>
      </a-entity>

      <a-entity position="0 2.5 -3">
        <a-plane color="#222" width="4" height="1.5" opacity="0.8">
          <a-text id="info-text" value="Gaze at a sphere to explore a career field" 
                  align="center" color="#FFF" width="3.5"></a-text>
        </a-plane>
      </a-entity>

      <a-entity position="-4 1.25 -2" 
                environment-changer="preset: dream; careerTitle: MEDICAL; description: Welcome to the Surgery Ward. Sterilized equipment and life-saving tech.">
        <a-sphere radius="0.6" color="#e74c3c"></a-sphere>
        <a-text value="MEDICAL" align="center" position="0 -0.8 0"></a-text>
      </a-entity>

      <a-entity position="-2 1.25 -2" 
                environment-changer="preset: osiris; careerTitle: ENGINEERING; description: Industrial Manufacturing Plant. Focus on heavy machinery and structural design.">
        <a-sphere radius="0.6" color="#f1c40f"></a-sphere>
        <a-text value="ENGINEER" align="center" position="0 -0.8 0"></a-text>
      </a-entity>

      <a-entity position="0 1.25 -2" 
                environment-changer="preset: threetowers; careerTitle: ART STUDIO; description: Natural lighting, canvases, and oil paints. A space for creative expression.">
        <a-sphere radius="0.6" color="#9b59b6"></a-sphere>
        <a-text value="ARTIST" align="center" position="0 -0.8 0"></a-text>
      </a-entity>

      <a-entity position="2 1.25 -2" 
                environment-changer="preset: volcano; careerTitle: MOVIE SET; description: Lights, Camera, Action! Surrounded by staff, cast, and the Director's chair.">
        <a-sphere radius="0.6" color="#34495e"></a-sphere>
        <a-text value="ACTOR" align="center" position="0 -0.8 0"></a-text>
      </a-entity>

      <a-entity position="4 1.25 -2" 
                environment-changer="preset: goldmine; careerTitle: KITCHEN; description: A high-pressure culinary environment with industrial stoves and chef stations.">
        <a-sphere radius="0.6" color="#e67e22"></a-sphere>
        <a-text value="CHEF" align="center" position="0 -0.8 0"></a-text>
      </a-entity>

      <a-entity position="0 1.25 1" 
                environment-changer="preset: forest; careerTitle: PHOTO STUDIO; description: Professional studio with softboxes, backdrops, and high-end cameras.">
        <a-sphere radius="0.6" color="#3498db"></a-sphere>
        <a-text value="PHOTOGRAPHER" align="center" position="0 -0.8 0"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
